        let todosLosProductos = [];
        let productosFiltrados = [];
        let timeoutBusqueda = null;

        function inicializar() {
            todosLosProductos = DATA.map(p => ({
                nombre: p.n,
                stock: p.s,
                precio: p.p,
                vencimiento: p.v,
                laboratorio: p.l
            }));

            productosFiltrados = [...todosLosProductos];
            poblarFiltros();
            mostrarProductos(todosLosProductos);
        }

        function poblarFiltros() {
            const laboratorios = [...new Set(todosLosProductos.map(p => p.laboratorio))].sort();
            const select = document.getElementById('filtroLaboratorio');
            select.innerHTML = '<option value="">Todos los laboratorios</option>';
            laboratorios.forEach(lab => {
                const option = document.createElement('option');
                option.value = lab;
                option.textContent = lab;
                select.appendChild(option);
            });
        }

        function buscarProductos(termino) {
            if (!termino.trim()) {
                aplicarFiltros();
                return;
            }
            const terminoLower = termino.toLowerCase();
            const resultados = productosFiltrados.filter(p => 
                p.nombre.toLowerCase().includes(terminoLower) ||
                p.laboratorio.toLowerCase().includes(terminoLower)
            );
            mostrarResultados(resultados, termino);
        }

        function aplicarFiltros() {
            const laboratorio = document.getElementById('filtroLaboratorio').value;
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            let resultados = [...todosLosProductos];
            if (laboratorio) resultados = resultados.filter(p => p.laboratorio === laboratorio);
            if (busqueda) resultados = resultados.filter(p => p.nombre.toLowerCase().includes(busqueda) || p.laboratorio.toLowerCase().includes(busqueda));
            productosFiltrados = resultados;
            mostrarResultados(resultados, busqueda);
        }

        function mostrarResultados(productos, busqueda = '') {
            const contenedor = document.getElementById('contenedor');
            const infoDiv = document.getElementById('resultadosInfo');
            if (productos.length === 0) {
                contenedor.innerHTML = '<div class="sin-resultados"><div class="emoji">❌</div><p>No encontramos productos</p></div>';
                infoDiv.style.display = 'none';
                return;
            }
            const html = productos.map(p => `
                <div class="producto-card">
                    <div class="producto-nombre">${p.nombre}</div>
                    <div class="producto-info">
                        <div class="info-item"><span class="info-label">💰 Precio</span><span class="info-value precio">$${p.precio.toLocaleString('es-AR', {maximumFractionDigits: 2})}</span></div>
                        <div class="info-item"><span class="info-label">📦 Stock</span><span class="info-value stock">${p.stock} unidades</span></div>
                        <div class="info-item"><span class="info-label">📅 Vence</span><span class="info-value vencimiento">${p.vencimiento}</span></div>
                        <div class="info-item"><span class="info-label">🏢 Lab</span><span class="info-value laboratorio">${p.laboratorio}</span></div>
                    </div>
                </div>
            `).join('');
            contenedor.innerHTML = html;
            infoDiv.style.display = 'flex';
            document.getElementById('countActual').textContent = productos.length;
            document.getElementById('countTotal').textContent = todosLosProductos.length;
            if (busqueda) {
                document.getElementById('statBusqueda').style.display = 'flex';
                document.getElementById('textoBusqueda').textContent = busqueda;
            } else {
                document.getElementById('statBusqueda').style.display = 'none';
            }
        }

        function mostrarProductos(productos) {
            mostrarResultados(productos);
        }

        function limpiarFiltros() {
            document.getElementById('buscador').value = '';
            document.getElementById('filtroLaboratorio').value = '';
            productosFiltrados = [...todosLosProductos];
            mostrarProductos(todosLosProductos);
        }

        document.getElementById('buscador').addEventListener('input', (e) => {
            clearTimeout(timeoutBusqueda);
            timeoutBusqueda = setTimeout(() => buscarProductos(e.target.value), 150);
        });

        inicializar();
    </script>
